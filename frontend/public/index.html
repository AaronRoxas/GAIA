<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        try {
          if (localStorage.getItem('gaia-theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.colorScheme = 'light';
          }
        } catch (e) {}
      })();
    </script>
    <meta name="theme-color" content="#096dd9" />
    <meta
    name="description"
    content="AGAILA: Geospatial AI-driven Assessment for Philippine Environmental Hazard Detection"
    />

    <!-- favicons -->

    <!-- iOS 7 or prior (legacy) -->
